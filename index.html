<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Token App</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; margin-top: 50px; gap: 20px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 5px; border: 1px solid #ccc; }
        #sendBtn { background-color: #007bff; color: white; border: none; }
        #sendBtn:disabled { background-color: #cccccc; cursor: not-allowed; }
        #status { color: #555; font-style: italic; }
    </style>
</head>
<body>

    <h1>My Token Transfer</h1>
    
    <button id="connectBtn">Connect MetaMask</button>
    <button id="sendBtn" disabled>Send 10 Tokens</button>
    
    <p id="status">Please connect your wallet first.</p>

    <script type="module">
        import { createThirdwebClient, getContract, sendTransaction } from "https://esm.sh/thirdweb";
        import { transfer } from "https://esm.sh/thirdweb/extensions/erc20";
        import { createWallet } from "https://esm.sh/thirdweb/wallets";

        // 1. Initialize your client and contract
        const client = createThirdwebClient({ clientId: "f89074cf1659a96271facb5788ed19b2" });
        const tokenContract = getContract({
            client,
            chain: 11155111, // Sepolia Testnet
            address: "0xE14c55A25c889f8B7A1E3ebF61e8ceA2B7504D8C" 
        });

        // 2. Grab the HTML elements
        const connectBtn = document.getElementById('connectBtn');
        const sendBtn = document.getElementById('sendBtn');
        const statusText = document.getElementById('status');

        let activeAccount = null;

        // 3. Logic to connect the wallet
        connectBtn.addEventListener('click', async () => {
            try {
                statusText.innerText = "Connecting to wallet...";
                
                // Initialize MetaMask
                const wallet = createWallet("io.metamask");
                
                // Prompt user to connect
                activeAccount = await wallet.connect({ client });
                
                // Update UI upon success
                statusText.innerText = `Connected as: ${activeAccount.address}`;
                connectBtn.innerText = "Wallet Connected";
                connectBtn.disabled = true;
                sendBtn.disabled = false; // Enable the send button
            } catch (error) {
                console.error(error);
                statusText.innerText = "Failed to connect wallet. Do you have MetaMask installed?";
            }
        });

        // 4. Logic to send the transaction
        sendBtn.addEventListener('click', async () => {
            if (!activeAccount) return;

            try {
                statusText.innerText = "Please confirm the transaction in your wallet...";
                
                // Prepare the token transfer
                const transaction = transfer({
                    contract: tokenContract,
                    to: "0xD9041F398453DEaC49A1f69d87E64d18721F17e0", // ---> CHANGE THIS TO A REAL WALLET ADDRESS
                    amount: "10", // Amount of tokens to send
                });

                // Send the transaction to the blockchain
                const { transactionHash } = await sendTransaction({
                    transaction,
                    account: activeAccount
                });

                statusText.innerText = `Success! Transaction Hash: ${transactionHash}`;
            } catch (error) {
                console.error(error);
                statusText.innerText = "Transaction failed or was rejected by user.";
            }
        });
    </script>
</body>
</html>
